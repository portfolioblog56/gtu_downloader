name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # Define the Node.js versions to test against

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      # Check out the repository code

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # Set up Node.js and cache npm dependencies

    - name: Install dependencies
      run: npm ci
      # Clean install of dependencies

    - name: Build the project
      run: npm run build
      # Build the project

    - name: Run tests
      run: npm test
      # Run tests

    - name: Deploy to Vercel (optional)
      if: github.ref == 'refs/heads/main'
      uses: amondnet/vercel-action@v21
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Deploy to Vercel if on main branch (configure Vercel action if needed)
